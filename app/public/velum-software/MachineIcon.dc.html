<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<sc-if value="{{ isLaser }}" hint-placeholder-val="{{ true }}">
  <svg width="100%" height="100%" viewBox="0 0 48 48" fill="none" stroke="{{ color }}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M24 5 V23"></path>
    <path d="M18 23 L24 31 L30 23 Z"></path>
    <path d="M9 39 H39"></path>
    <path d="M21 39 l3 -4 l3 4"></path>
  </svg>
</sc-if>
<sc-if value="{{ isPlegadora }}" hint-placeholder-val="{{ true }}">
  <svg width="100%" height="100%" viewBox="0 0 48 48" fill="none" stroke="{{ color }}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 37 H27 L41 16"></path>
    <path d="M24 37 A9 9 0 0 0 31 25"></path>
  </svg>
</sc-if>
<sc-if value="{{ isPunzon }}" hint-placeholder-val="{{ true }}">
  <svg width="100%" height="100%" viewBox="0 0 48 48" fill="none" stroke="{{ color }}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <rect x="7" y="27" width="34" height="13" rx="1.5"></rect>
    <circle cx="16" cy="33.5" r="1.8" fill="{{ color }}" stroke="none"></circle>
    <circle cx="24" cy="33.5" r="1.8" fill="{{ color }}" stroke="none"></circle>
    <circle cx="32" cy="33.5" r="1.8" fill="{{ color }}" stroke="none"></circle>
    <path d="M24 6 V19"></path>
    <path d="M20 15 L24 20 L28 15"></path>
  </svg>
</sc-if>
<sc-if value="{{ isFresa }}" hint-placeholder-val="{{ true }}">
  <svg width="100%" height="100%" viewBox="0 0 48 48" fill="none" stroke="{{ color }}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="24" cy="24" r="10"></circle>
    <path d="M24 7 V12"></path>
    <path d="M24 36 V41"></path>
    <path d="M7 24 H12"></path>
    <path d="M36 24 H41"></path>
    <circle cx="24" cy="24" r="2.4" fill="{{ color }}" stroke="none"></circle>
  </svg>
</sc-if>
<sc-if value="{{ isExpansora }}" hint-placeholder-val="{{ true }}">
  <svg width="100%" height="100%" viewBox="0 0 48 48" fill="none" stroke="{{ color }}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M24 9 L33 19 L24 29 L15 19 Z"></path>
    <path d="M15 19 L6 29 M33 19 L42 29 M24 29 L24 39"></path>
    <path d="M15 39 L24 29 L33 39"></path>
  </svg>
</sc-if>
<sc-if value="{{ isPintura }}" hint-placeholder-val="{{ true }}">
  <svg width="100%" height="100%" viewBox="0 0 48 48" fill="none" stroke="{{ color }}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <rect x="11" y="15" width="15" height="23" rx="2"></rect>
    <path d="M26 21 H32 V27"></path>
    <circle cx="38" cy="13" r="1.5" fill="{{ color }}" stroke="none"></circle>
    <circle cx="41" cy="19" r="1.5" fill="{{ color }}" stroke="none"></circle>
    <circle cx="38" cy="25" r="1.5" fill="{{ color }}" stroke="none"></circle>
  </svg>
</sc-if>
<sc-if value="{{ isEmbalado }}" hint-placeholder-val="{{ true }}">
  <svg width="100%" height="100%" viewBox="0 0 48 48" fill="none" stroke="{{ color }}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M24 6 L40 14 V32 L24 40 L8 32 V14 Z"></path>
    <path d="M8 14 L24 22 L40 14"></path>
    <path d="M24 22 V40"></path>
  </svg>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:48,&quot;height&quot;:48},&quot;type&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;laser&quot;,&quot;plegadora&quot;,&quot;punzon&quot;,&quot;fresa&quot;,&quot;expansora&quot;,&quot;pintura&quot;],&quot;default&quot;:&quot;laser&quot;},&quot;color&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#8B7355&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const t = this.props.type || 'laser';
    return {
      color: this.props.color || '#8B7355',
      isLaser: t === 'laser',
      isPlegadora: t === 'plegadora',
      isPunzon: t === 'punzon',
      isFresa: t === 'fresa',
      isExpansora: t === 'expansora',
      isPintura: t === 'pintura',
      isEmbalado: t === 'embalado'
    };
  }
}
</script>
</body>
</html>
